name: Build Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t weather-api:latest .
    
    - name: Test Docker image
      run: docker run --rm weather-api:latest python -c "from app import app; print('✅ Docker build successful')"
